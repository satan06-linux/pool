<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CyberSec Platform</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="theme-toggle">
                <button class="theme-btn" onclick="toggleTheme()">
                    <i class="fas fa-sun" id="themeIcon"></i>
                </button>
            </div>
            <div class="brand-logo">
                <i class="fas fa-shield-alt"></i>
                <span>CyberSec Platform</span>
            </div>
        </div>

        <div class="auth-content">
            <div class="auth-card">
                <div class="auth-card-header">
                    <h1>Reset Password</h1>
                    <p>Enter your email address and we'll send you a link to reset your password</p>
                </div>

                <form id="forgotPasswordForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required class="form-input" placeholder="Enter your email">
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-paper-plane"></i>
                        Send Reset Link
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Remember your password? <a href="login.html">Sign in here</a></p>
                    <p>Don't have an account? <a href="register.html">Create one here</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Sending reset link...</p>
    </div>

    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('forgotPasswordForm').addEventListener('submit', handleForgotPassword);
        });

        async function handleForgotPassword(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();

            if (!email) {
                showNotification('Please enter your email address', 'error');
                return;
            }

            if (!isValidEmail(email)) {
                showNotification('Please enter a valid email address', 'error');
                return;
            }

            showLoading();
            
            try {
                // Simulate API call for forgot password
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                showNotification('Password reset link sent to your email!', 'success');
                
                // Clear form and redirect to login
                document.getElementById('email').value = '';
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                showNotification('Failed to send reset link. Please try again.', 'error');
            }
            
            hideLoading();
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }
    </script>
</body>
</html>
